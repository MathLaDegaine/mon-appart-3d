<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAppart 3D | Studio d'agencement libre</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <aside class="sidebar">
        <header class="brand">
            <div class="brand-logo">🛋️</div>
            <div>
                <h1>OpenAppart <span>3D</span></h1>
                <p>Agencement & conception 100% libre</p>
            </div>
        </header>

        <section class="control-panel">
            <span class="panel-tag">01. Dimensions (mètres)</span>
            <div class="slider-group">
                <div class="slider-label">
                    <span>Largeur</span>
                    <strong id="label-width">5.0 m</strong>
                </div>
                <input type="range" id="input-width" min="2" max="10" step="0.5" value="5">
            </div>
            <div class="slider-group">
                <div class="slider-label">
                    <span>Longueur</span>
                    <strong id="label-length">4.0 m</strong>
                </div>
                <input type="range" id="input-length" min="2" max="10" step="0.5" value="4">
            </div>
        </section>

        <section class="control-panel">
            <span class="panel-tag">02. Mobilier essentiel</span>
            <div class="grid-2">
                <button class="btn-catalog" data-item="bed">
                    <span class="icon">🛏️</span>
                    <span class="text">Lit Double</span>
                </button>
                <button class="btn-catalog" data-item="desk">
                    <span class="icon">💻</span>
                    <span class="text">Bureau</span>
                </button>
                <button class="btn-catalog" data-item="sofa">
                    <span class="icon">🛋️</span>
                    <span class="text">Canapé</span>
                </button>
                <button class="btn-catalog" data-item="table">
                    <span class="icon">🍽️</span>
                    <span class="text">Table</span>
                </button>
            </div>
        </section>

        <section class="control-panel">
            <span class="panel-tag">03. Technique & Ouvertures</span>
            <div class="grid-2">
                <button class="btn-catalog tech" data-item="plug">
                    <span class="icon">⚡</span>
                    <span class="text">Prise élec.</span>
                </button>
                <button class="btn-catalog tech" data-item="water">
                    <span class="icon">💧</span>
                    <span class="text">Arrivée eau</span>
                </button>
                <button class="btn-catalog tech" data-item="window">
                    <span class="icon">🔲</span>
                    <span class="text">Fenêtre</span>
                </button>
                <button class="btn-catalog tech" data-item="door">
                    <span class="icon">🚪</span>
                    <span class="text">Porte</span>
                </button>
            </div>
        </section>

        <footer class="sidebar-actions">
            <button id="btn-export" class="btn-action primary">💾 Exporter le plan JSON</button>
            <button id="btn-clear" class="btn-action danger">🗑️ Réinitialiser</button>
        </footer>
    </aside>

    <main id="viewport">
        <div class="hud-top">
            <div class="badge">Espace de travail 3D</div>
            <div class="shortcuts">
                <span><b>Clic gauche</b> Déplacer</span>
                <span><b>Touche R</b> Pivot 45°</span>
                <span><b>Clic droit</b> Orbite</span>
            </div>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
