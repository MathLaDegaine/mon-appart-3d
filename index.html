<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAppart 3D - Agenceur d'intérieur libre</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <aside class="sidebar">
        <header>
            <h1>📐 OpenAppart 3D</h1>
            <p>Concepteur libre 1m = 1 unité 3D</p>
        </header>

        <section class="panel-section">
            <h2>1. Dimensions de la pièce</h2>
            <div class="input-group">
                <label for="room-width">Largeur (m) : <span id="val-width">5</span>m</label>
                <input type="range" id="room-width" min="2" max="10" step="0.5" value="5">
            </div>
            <div class="input-group">
                <label for="room-length">Longueur (m) : <span id="val-length">4</span>m</label>
                <input type="range" id="room-length" min="2" max="10" step="0.5" value="4">
            </div>
        </section>

        <section class="panel-section">
            <h2>2. Mobilier (Échelle réelle)</h2>
            <div class="button-grid">
                <button class="btn-item" data-type="bed">🛏️ Lit Double (1.4x1.9m)</button>
                <button class="btn-item" data-type="desk">💻 Bureau (1.2x0.6m)</button>
                <button class="btn-item" data-type="sofa">🛋️ Canapé (2.0x0.9m)</button>
                <button class="btn-item" data-type="table">🍽️ Table (1.2x0.8m)</button>
            </div>
        </section>

        <section class="panel-section">
            <h2>3. Technique & Ouvertures</h2>
            <div class="button-grid">
                <button class="btn-item tech" data-type="plug">⚡ Prise élec.</button>
                <button class="btn-item tech" data-type="water">💧 Arrivée d'eau</button>
                <button class="btn-item tech" data-type="window">🔲 Fenêtre (1.2m)</button>
                <button class="btn-item tech" data-type="door">🚪 Porte (0.9m)</button>
            </div>
        </section>

        <section class="panel-section actions">
            <h2>4. Données du plan</h2>
            <button id="btn-export" class="btn-primary">💾 Exporter le plan (JSON)</button>
            <button id="btn-clear" class="btn-danger">🗑️ Tout effacer</button>
        </section>
    </aside>

    <main id="viewport">
        <div id="instructions">
            💡 <strong>Clic gauche + Drag :</strong> Déplacer un meuble | <strong>Clic droit + Drag :</strong> Tourner la caméra | <strong>Molette :</strong> Zoom
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
